dkan_nl_query.query:
  path: '/api/nl-query/{dataset_id}'
  defaults:
    _controller: 'dkan_nl_query.controller:query'
  methods: [POST]
  requirements:
    _permission: 'access content'

dkan_nl_query.query_all:
  path: '/api/nl-query'
  defaults:
    _controller: 'dkan_nl_query.controller:query'
    dataset_id: null
  methods: [POST]
  requirements:
    _permission: 'access content'

dkan_nl_query.datasets:
  path: '/api/nl-query-datasets'
  defaults:
    _controller: 'dkan_nl_query.controller:listDatasets'
  methods: [GET]
  requirements:
    _permission: 'access content'

dkan_nl_query.conversations_list:
  path: '/api/nl-query/conversations'
  defaults:
    _controller: 'dkan_nl_query.history_controller:list'
  methods: [GET]
  requirements:
    _permission: 'manage own nl query conversations'

dkan_nl_query.conversation_load:
  path: '/api/nl-query/conversations/{id}'
  defaults:
    _controller: 'dkan_nl_query.history_controller:load'
  methods: [GET]
  requirements:
    _permission: 'manage own nl query conversations'
    id: '\d+'

dkan_nl_query.conversation_delete:
  path: '/api/nl-query/conversations/{id}'
  defaults:
    _controller: 'dkan_nl_query.history_controller:delete'
  methods: [DELETE]
  requirements:
    _permission: 'manage own nl query conversations'
    id: '\d+'

dkan_nl_query.conversation_pin:
  path: '/api/nl-query/conversations/{id}/pin'
  defaults:
    _controller: 'dkan_nl_query.history_controller:togglePin'
  methods: [PATCH]
  requirements:
    _permission: 'manage own nl query conversations'
    id: '\d+'

dkan_nl_query.settings:
  path: '/admin/config/dkan/nl-query'
  defaults:
    _form: '\Drupal\dkan_nl_query\Form\NlQuerySettingsForm'
    _title: 'Natural Language Query Settings'
  requirements:
    _permission: 'administer site configuration'
