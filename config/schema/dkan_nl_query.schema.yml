dkan_nl_query.settings:
  type: config_object
  label: 'DKAN NL Query settings'
  mapping:
    anthropic_api_key:
      type: string
      label: 'Anthropic API key'
    openai_api_key:
      type: string
      label: 'OpenAI API key'
    model:
      type: string
      label: 'Default model'
    max_tokens:
      type: integer
      label: 'Max tokens'
    max_iterations:
      type: integer
      label: 'Max agentic iterations'
    show_model_selector:
      type: boolean
      label: 'Show model selector in widget'
    show_examples:
      type: boolean
      label: 'Show example question buttons'
    show_debug_panel:
      type: boolean
      label: 'Show tool calls debug panel'
    show_follow_up_suggestions:
      type: boolean
      label: 'Show follow-up question suggestions'
    show_api_call_button:
      type: boolean
      label: 'Show API call button on query results'
    show_sql_button:
      type: boolean
      label: 'Show SQL button on query results'
    show_sql_in_debug:
      type: boolean
      label: 'Show SQL in debug panel'
    save_chat_history:
      type: boolean
      label: 'Save chat history'
