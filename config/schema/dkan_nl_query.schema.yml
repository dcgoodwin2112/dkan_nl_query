dkan_nl_query.settings:
  type: config_object
  label: 'DKAN NL Query settings'
  mapping:
    provider:
      type: string
      label: 'Default LLM provider'
    anthropic_api_key:
      type: string
      label: 'Anthropic API key'
    openai_api_key:
      type: string
      label: 'OpenAI API key'
    model:
      type: string
      label: 'Default model'
    max_tokens:
      type: integer
      label: 'Max tokens'
