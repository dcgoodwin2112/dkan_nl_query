services:
  dkan_nl_query.schema_context_builder:
    class: Drupal\dkan_nl_query\Service\SchemaContextBuilder
    arguments:
      - '@dkan_mcp.tools.metastore'
      - '@dkan_mcp.tools.datastore'
      - '@cache.default'

  dkan_nl_query.tool_executor:
    class: Drupal\dkan_nl_query\Service\ToolExecutor
    arguments:
      - '@dkan_mcp.tools.datastore'
      - '@dkan_mcp.tools.metastore'
      - '@dkan_mcp.tools.search'

  dkan_nl_query.llm_provider_factory:
    class: Drupal\dkan_nl_query\Llm\LlmProviderFactory
    arguments:
      - '@config.factory'

  dkan_nl_query.nl_query:
    class: Drupal\dkan_nl_query\Service\NlQueryService
    arguments:
      - '@dkan_nl_query.schema_context_builder'
      - '@dkan_nl_query.tool_executor'
      - '@config.factory'
      - '@dkan_nl_query.llm_provider_factory'
      - '@logger.factory'

  dkan_nl_query.controller:
    class: Drupal\dkan_nl_query\Controller\NlQueryController
    arguments:
      - '@dkan_nl_query.nl_query'
      - '@dkan_nl_query.schema_context_builder'
